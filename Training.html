<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #222;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

.logo img { width: 80px; }

.nav-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.nav-buttons button {
  background: none;
  border: none;
  color: white;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

.nav-buttons button:hover {
  color: #00bfff;
}

/* SEARCH */
.search-box input { padding: 6px; }

.search-box button {
  padding: 6px 10px;
  background: #00bfff;
  border: none;
  color: white;
  cursor: pointer;
}

/* CART */
.cart-btn {
  background: #ff9800;
  border: none;
  padding: 8px 12px;
  color: white;
  cursor: pointer;
}

/* PAGE */
.page {
  display: none;
  padding: 40px;
  text-align: center;
}

.page.active {
  display: block;
}

/* PRODUCTS */
.products {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.card {
  background: white;
  width: 220px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card button {
  background: #00bfff;
  border: none;
  color: white;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}

/* CART BOX */
.cart-box {
  position: fixed;
  right: 10px;
  top: 80px;
  width: 320px;
  background: white;
  padding: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
  display: none;
  max-height: 500px;
  overflow-y: auto;
}

.cart-title {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
}

.cart-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f9f9f9;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 8px;
}

.cart-item img {
  width: 50px;
  height: 50px;
  object-fit: cover;
  border-radius: 5px;
}

.cart-item h4 {
  margin: 0;
  font-size: 14px;
}

</style>
</head>

<body>

<header>

  <div class="logo">
    <img src="https://sp-ao.shortpixel.ai/client/to_webp,q_glossy,ret_img,w_750,h_400/http://assets.designhill.com/design-blog/wp-content/uploads/2019/04/19.png">
  </div>

  <div class="nav-buttons">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('men')">Men</button>
    <button onclick="showPage('women')">Women</button>
    <button onclick="showPage('kids')">Kids</button>
    <button onclick="showPage('sale')">Sale</button>
    <button onclick="showPage('contact')">Contact</button>
  </div>

  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search...">
    <button onclick="searchProduct()">Search</button>
  </div>

  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart (<span id="cartCount">0</span>)
  </button>

</header>

<!-- CART BOX -->
<div class="cart-box" id="cartBox">
  <div class="cart-title">Your Cart</div>
  <div id="cartItems"></div>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Home Collection</h1>
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600">
      <h3>T-Shirt</h3>
      <button onclick="addCart('T-Shirt','https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=600')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600">
      <h3>Shoes</h3>
      <button onclick="addCart('Shoes','https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600')">Add</button>
    </div>

  </div>
</div>

<!-- MEN -->
<div id="men" class="page">
  <h1>Men Collection</h1>
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47?w=600">
      <h3>Men Shirt</h3>
      <button onclick="addCart('Men Shirt','https://images.unsplash.com/photo-1521335629791-ce4aec67dd47?w=600')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975922284-9c0b1d2d5a2c?w=600">
      <h3>Jeans</h3>
      <button onclick="addCart('Jeans','https://images.unsplash.com/photo-1520975922284-9c0b1d2d5a2c?w=600')">Add</button>
    </div>

  </div>
</div>

<!-- WOMEN -->
<div id="women" class="page">
  <h1>Women Collection</h1>
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600">
      <h3>Dress</h3>
      <button onclick="addCart('Dress','https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=600')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=600">
      <h3>Handbag</h3>
      <button onclick="addCart('Handbag','https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=600')">Add</button>
    </div>

  </div>
</div>

<!-- KIDS -->
<div id="kids" class="page">
  <h1>Kids Collection</h1>
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519689680058-324335c77eba?w=600">
      <h3>Kids T-Shirt</h3>
      <button onclick="addCart('Kids T-Shirt','https://images.unsplash.com/photo-1519689680058-324335c77eba?w=600')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?w=600">
      <h3>Kids Shoes</h3>
      <button onclick="addCart('Kids Shoes','https://images.unsplash.com/photo-1520975916090-3105956dac38?w=600')">Add</button>
    </div>

  </div>
</div>

<!-- SALE -->
<div id="sale" class="page">
  <h1>🔥 Sale Offers</h1>
  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=600">
      <h3>Jacket - 50% OFF</h3>
      <button onclick="addCart('Jacket','https://images.unsplash.com/photo-1512436991641-6745cdb1723f?w=600')">Add</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600">
      <h3>Watch - Discount</h3>
      <button onclick="addCart('Watch','https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=600')">Add</button>
    </div>

  </div>
</div>

<!-- CONTACT -->
<div id="contact" class="page">
  <h1>Contact Us</h1>
  <input placeholder="Name"><br><br>
  <input placeholder="Email"><br><br>
  <textarea placeholder="Message"></textarea><br><br>
  <button>Send</button>
</div>

<script>

let cart = [];

/* PAGE SWITCH */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* CART */
function addCart(name,img){
  cart.push({name,img});
  updateCart();
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;

  let box = document.getElementById("cartItems");
  box.innerHTML = "";

  cart.forEach(item=>{
    box.innerHTML += `
      <div class="cart-item">
        <img src="${item.img}">
        <h4>${item.name}</h4>
      </div>
    `;
  });
}

function toggleCart(){
  let box = document.getElementById("cartBox");
  box.style.display = (box.style.display==="block") ? "none" : "block";
}

/* SEARCH */
function searchProduct(){
  let value = document.getElementById("searchInput").value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    let title = card.querySelector("h3").innerText.toLowerCase();
    card.style.display = title.includes(value) ? "block" : "none";
  });
}

</script>

</body>
</html>
